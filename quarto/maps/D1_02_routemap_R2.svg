<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <defs>
    <filter id="paper" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="11"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#8a7b64" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d85a4a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#367dcc"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4a9b62"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#de8b31"/>
    </marker>
    <style>
      .jpko {
        font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "YuGothic", "Apple SD Gothic Neo", "Arial Unicode MS", sans-serif;
      }
      .label {
        font-size: 19px;
        font-weight: 700;
        fill: #34403b;
        paint-order: stroke;
        stroke: #fff8ea;
        stroke-width: 5px;
        stroke-linejoin: round;
      }
      .small {
        font-size: 16px;
        font-weight: 700;
        fill: #3f4743;
        paint-order: stroke;
        stroke: #fffaf0;
        stroke-width: 4px;
        stroke-linejoin: round;
      }
      .bay {
        font-size: 26px;
        font-weight: 800;
        fill: #447f9c;
        opacity: 0.88;
      }
      .route {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 6;
        stroke-dasharray: 2 14;
      }
      .pinText {
        font-family: Arial, sans-serif;
        font-size: 17px;
        font-weight: 800;
        fill: white;
      }
    </style>
  </defs>

  <rect width="900" height="900" fill="#fbf2dd"/>
  <g filter="url(#paper)">
    <path d="M42 96 C139 54 255 68 326 104 C410 146 488 110 586 94 C698 76 794 112 846 190 C900 272 849 374 824 461 C797 553 827 636 780 732 C731 832 606 855 502 834 C415 816 362 762 278 763 C180 764 83 728 54 632 C26 538 87 466 76 374 C65 270 -47 162 42 96Z" fill="#e7dca5"/>
