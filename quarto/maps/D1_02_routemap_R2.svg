    <g transform="translate(665 728)">
      <path d="M0 -38 C24 -38 42 -19 42 4 C42 33 0 66 0 66 C0 66 -42 33 -42 4 C-42 -19 -24 -38 0 -38Z" fill="#de8b31"/>
