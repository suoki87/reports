  <text x="688" y="812" class="jpko bay">東京湾 / Tokyo Bay</text>

  <path class="route" d="M770 288 C681 323 555 383 438 454" stroke="#d85a4a" marker-end="url(#arrowRed)"/>
  <path class="route" d="M413 438 C400 389 394 330 392 275" stroke="#367dcc" marker-end="url(#arrowBlue)"/>
  <path class="route" d="M414 276 C430 331 434 386 426 444" stroke="#367dcc" marker-end="url(#arrowBlue)"/>
  <path class="route" d="M439 478 C492 503 560 536 610 572" stroke="#4a9b62" marker-end="url(#arrowGreen)"/>
  <path class="route" d="M630 616 C646 645 657 681 662 706" stroke="#de8b31" marker-end="url(#arrowOrange)"/>

  <text x="579" y="348" class="jpko small">N'EX 22号</text>
